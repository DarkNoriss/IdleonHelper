name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDK
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build backend
        if: steps.semantic.outputs.new_release_published == 'true'
        run: pnpm build:backend

      - name: Build frontend
        if: steps.semantic.outputs.new_release_published == 'true'
        run: pnpm build

      - name: Build Electron app
        if: steps.semantic.outputs.new_release_published == 'true'
        run: pnpm exec electron-builder --win --publish never

      - name: Upload artifacts to GitHub release
        if: steps.semantic.outputs.new_release_published == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.semantic.outputs.new_release_version }}"
          $assets = Get-ChildItem -Path dist\* -File -Include *.exe, *.exe.blockmap, latest.yml |
            Select-Object -ExpandProperty FullName
          if (-not $assets) {
            throw "No release artifacts found in dist/"
          }
          gh release upload $tag @assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release upload failed with exit code $LASTEXITCODE" }
